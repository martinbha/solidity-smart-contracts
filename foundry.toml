[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# The OZ Governor stack (src/governance) exceeds the 24KB runtime size limit
# unoptimized. Its deploy runs under this profile (utils/governance/
# deploy_dao.sh); the default profile stays unoptimized so the gas numbers
# the other patterns teach with stay as measured. Separate artifact/cache
# dirs keep the two profiles from clobbering each other's builds.
[profile.optimized]
optimizer = true
optimizer_runs = 200
out = "out/optimized"
cache_path = "cache/optimized"

# File access for the merkle tree tooling (script/merkle/*):
# read the recipient list, write the generated tree.
fs_permissions = [
    { access = "read", path = "./utils/merkle/recipients.json" },
    { access = "read-write", path = "./deployments/merkle" },
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
